name: Auto Translate Markdown to English

on:
  push:
    paths:
      - 'README.md'
      - 'ERRATA.md'      # 监听这两个中文文件的变动
    branches:
      - main             # 监听的分支，根据您的实际情况修改(如 master)

jobs:
  translate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # 获取历史记录以便对比文件变动

      - name: Run GPT Translate Action
        uses: imaun/gpt-translate-action@v1.9.0
        env:
          # 通过 env 注入 Base URL，OpenAI SDK 会自动识别并指向 DeepSeek 服务
          OPENAI_BASE_URL: "https://api.deepseek.com/v1"
        with:
          api_key: ${{ secrets.DEEPSEEK_API_KEY }} # 确保在 GitHub Secrets 里配置了该 Key
          ai_service: "openai"                        
          ai_model: "deepseek-v4-pro"                 
          target_lang: "English"
          target_lang_code: "en"
          file_exts: "md"                             # 修正参数名：从 file_extensions 改为 file_exts
          output_format: "{name}_EN.{ext}"
          system_prompt: "You are an expert in Computer Science, Discrete Mathematics, and Graph Theory. Translate the following markdown text to professional academic English. Keep all markdown formatting, tables, and LaTeX formulas strictly intact."
