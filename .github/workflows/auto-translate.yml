name: Auto Translate Markdown to English

on:
  push:
    paths:
      - 'README.md'
      - 'ERRATA.md'      # 监听这两个中文文件的变动
    branches:
      - main             # 根据你的仓库实际分支修改（也可能是 master）

jobs:
  translate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # 获取足够历史以便对比文件变动

      - name: Run GPT Translate Action
        uses: imaun/gpt-translate-action@v1.9.0
        with:
          api_key: ${{ secrets.DEEPSEEK_API_KEY }}   # 在仓库 Settings → Secrets 中配置
          base_url: "https://api.deepseek.com/v1"    # DeepSeek API 地址
          model: "deepseek-v4-pro"                   # DeepSeek 模型名
          target_lang: "English"
          target_lang_code: "en"
          file_exts: "md"                            # 标准参数名是 file_exts
          output_format: "{name}_EN.{ext}"
          system_prompt: "You are an expert in Computer Science, Discrete Mathematics, and Graph Theory. Translate the following markdown text to professional academic English. Keep all markdown formatting, tables, and LaTeX formulas strictly intact."
